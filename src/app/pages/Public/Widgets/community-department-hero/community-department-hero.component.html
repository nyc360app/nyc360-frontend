<section class="community-department-hero">
  <header class="page-header">
    <small>Welcome to NYC360</small>
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>

    <div class="projected-search-shell">
      <ng-content select="[hero-search-slot]"></ng-content>
    </div>

    <form *ngIf="showDefaultSearch" class="community-header-search" (submit)="onSearch(searchInput.value); $event.preventDefault()">
      <i class="bi bi-search search-icon" aria-hidden="true"></i>
      <input #searchInput type="text" [placeholder]="searchPlaceholder" autocomplete="off">
      <button type="submit" class="search-btn">Search</button>
    </form>

    <div class="header-nav-buttons">
      <a routerLink="/public/discover" class="nav-btn">
        <i class="bi bi-rss nav-btn-icon"></i>
        <span>Explore</span>
      </a>
      <a routerLink="/public/category/community/saved" class="nav-btn">
        <i class="bi bi-journal-text nav-btn-icon"></i>
        <span>My Inquiries</span>
      </a>
      <a routerLink="/public/category/community/dashboard" class="nav-btn">
        <i class="bi bi-speedometer2 nav-btn-icon"></i>
        <span>Contributor Dashboard</span>
      </a>

      <div class="nav-dropdown-complex" (mouseenter)="openActivityDropdown()"
        (mouseleave)="scheduleCloseActivityDropdown()">
        <button class="nav-btn dropdown-toggle-btn" type="button" (click)="toggleActivityDropdown($event)"
          [class.active]="isActivityDropdownOpen">
          <i class="bi bi-activity nav-btn-icon"></i>
          <span>Contributor Activities</span>
          <i class="bi bi-chevron-down dropdown-caret"></i>
        </button>
        <div class="dropdown-menu-main" [class.show]="isActivityDropdownOpen" (click)="$event.stopPropagation()">
          <button type="button" class="simple-item activity-pill" (click)="openLeaderApplicationModal()">
            Apply For Community Leader
          </button>

          <a routerLink="/public/create-community" class="simple-item activity-pill" (click)="closeActivityDropdown()">
            Creating a Community
          </a>

          <button type="button" class="simple-item activity-pill"
            (click)="openVerificationFromDropdown('List Community Organization in THE360 SPACE')">
            List Community Organization in SPACE
          </button>

          <ng-container *ngIf="hasCommunityLeaderAccess; else lockedNews">
            <a routerLink="/public/posts/create" [queryParams]="{ category: 0 }" class="simple-item activity-pill"
              (click)="closeActivityDropdown()">
              Publish News Article
            </a>
          </ng-container>
          <ng-template #lockedNews>
            <div class="locked-tooltip-wrap">
              <button type="button" class="simple-item locked-row" disabled aria-disabled="true">
                <i class="bi bi-lock-fill" aria-hidden="true"></i>
                <span>Publish News Article</span>
              </button>
              <div class="locked-tooltip" role="tooltip">
                Requires Community Leader badge approval.
              </div>
            </div>
          </ng-template>

          <ng-container *ngIf="hasCommunityLeaderAccess; else lockedRSS">
            <a routerLink="/public/rss/connect" class="simple-item activity-pill" (click)="closeActivityDropdown()">
              Connect RSS Feed
            </a>
          </ng-container>
          <ng-template #lockedRSS>
            <div class="locked-tooltip-wrap">
              <button type="button" class="simple-item locked-row" disabled aria-disabled="true">
                <i class="bi bi-lock-fill" aria-hidden="true"></i>
                <span>Connect RSS Feed</span>
              </button>
              <div class="locked-tooltip" role="tooltip">
                Requires Community Leader badge approval.
              </div>
            </div>
          </ng-template>
        </div>
      </div>

      <a routerLink="/public/forums/community" class="nav-btn">
        <i class="bi bi-question-circle nav-btn-icon"></i>
        <span>Ask a Question</span>
      </a>
    </div>
  </header>

  <app-verification-modal *ngIf="isVerificationModalOpen" [categoryName]="'Community'" [categoryId]="4"
    [extraOccupations]="verificationModalOccupations" (close)="closeVerificationModal()" (verified)="onVerified()">
  </app-verification-modal>

  <app-community-leader-application-modal *ngIf="isLeaderApplicationModalOpen" [fullName]="leaderApplicationFullName"
    [email]="leaderApplicationEmail" [phoneNumber]="leaderApplicationPhoneNumber"
    (close)="closeLeaderApplicationModal()" (submitApplication)="onLeaderApplicationSubmitted($event)">
  </app-community-leader-application-modal>
</section>
