<section class="community-department-hero">
  <header class="page-header">
    <small>Welcome to NYC360</small>
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>

    <div class="projected-search-shell">
      <ng-content select="[hero-search-slot]"></ng-content>
    </div>

    <form *ngIf="showDefaultSearch" class="community-header-search" (submit)="onSearch(searchInput.value); $event.preventDefault()">
      <i class="bi bi-search search-icon" aria-hidden="true"></i>
      <input #searchInput type="text" [placeholder]="searchPlaceholder" autocomplete="off">
      <button type="submit" class="search-btn">Search</button>
    </form>

    <div class="header-nav-buttons">
      <a routerLink="/community/explore" class="nav-btn">
        <i class="bi bi-rss nav-btn-icon"></i>
        <span>Explore</span>
      </a>
      <a routerLink="/community/saved" class="nav-btn">
        <i class="bi bi-journal-text nav-btn-icon"></i>
        <span>My Inquiries</span>
      </a>
      <a routerLink="/community/dashboard" class="nav-btn">
        <i class="bi bi-speedometer2 nav-btn-icon"></i>
        <span>Contributor Dashboard</span>
      </a>

      <div class="nav-dropdown-wrapper" (mouseenter)="openActivityDropdown()"
        (mouseleave)="scheduleCloseActivityDropdown()">
        <button class="nav-btn dropdown-toggle-btn" type="button" (click)="toggleActivityDropdown($event)"
          [class.active]="isActivityDropdownOpen">
          <i class="bi bi-activity nav-btn-icon"></i>
          <span>Contributor Activities</span>
          <i class="bi bi-chevron-down dropdown-caret"></i>
        </button>
        <div class="dropdown-menu-custom" [class.show]="isActivityDropdownOpen" (click)="$event.stopPropagation()">
          <ng-container *ngIf="!hasCommunityContributorAccess; else contributorReadyState">
            <button type="button" class="dropdown-item-custom" (click)="openLeaderApplicationModal()">
              <i class="bi bi-stars" aria-hidden="true"></i>
              Start Community Journey
            </button>
          </ng-container>
          <ng-template #contributorReadyState>
            <div class="dropdown-item-custom status-item">
              <i class="bi bi-patch-check-fill" aria-hidden="true"></i>
              Community Contributor Access Active
            </div>
          </ng-template>

          <ng-container *ngIf="hasOrganizationListingAccess; else lockedOrganizationListing">
            <a routerLink="/community/listings/submit" class="dropdown-item-custom" (click)="closeActivityDropdown()">
              <i class="bi bi-geo-alt" aria-hidden="true"></i>
              List Community Organization in THE360 SPACE
            </a>
          </ng-container>
          <ng-template #lockedOrganizationListing>
            <button type="button" class="dropdown-item-custom locked" (click)="openOrganizationListingAccessModal()">
              <i class="bi bi-lock-fill" aria-hidden="true"></i>
              <span>List Community Organization in THE360 SPACE</span>
            </button>
          </ng-template>

          <ng-container *ngIf="hasCommunityLeaderAccess; else lockedPublishing">
            <a routerLink="/community/create/article" class="dropdown-item-custom"
              (click)="closeActivityDropdown()">
              <i class="bi bi-pencil-square" aria-hidden="true"></i>
              Write Community News or Announcement
            </a>
          </ng-container>
          <ng-template #lockedPublishing>
            <button type="button" class="dropdown-item-custom locked" (click)="openLeaderPublishingAccessModal()">
              <i class="bi bi-lock-fill" aria-hidden="true"></i>
              <span>Write Community News or Announcement</span>
            </button>
          </ng-template>

          <ng-container *ngIf="hasCommunityLeaderAccess; else lockedRSS">
            <a routerLink="/community/rss/connect" class="dropdown-item-custom"
              (click)="closeActivityDropdown()">
              <i class="bi bi-rss" aria-hidden="true"></i>
              Connect RSS Feed
            </a>
          </ng-container>
          <ng-template #lockedRSS>
            <button type="button" class="dropdown-item-custom locked" (click)="openLeaderPublishingAccessModal()">
              <i class="bi bi-lock-fill" aria-hidden="true"></i>
              <span>Connect RSS Feed</span>
            </button>
          </ng-template>

          <ng-container *ngIf="hasCreateCommunityAccess; else lockedCreateCommunity">
            <a routerLink="/community/create/community" class="dropdown-item-custom" (click)="closeActivityDropdown()">
              <i class="bi bi-people-fill" aria-hidden="true"></i>
              Create Community
            </a>
          </ng-container>
          <ng-template #lockedCreateCommunity>
            <button type="button" class="dropdown-item-custom locked" (click)="openCreateCommunityAccessModal()">
              <i class="bi bi-lock-fill" aria-hidden="true"></i>
              <span>Create Community</span>
            </button>
          </ng-template>
        </div>
      </div>

      <a routerLink="/community/discussions" class="nav-btn">
        <i class="bi bi-question-circle nav-btn-icon"></i>
        <span>Ask a Question</span>
      </a>
    </div>
  </header>

  <app-community-leader-application-modal *ngIf="isLeaderApplicationModalOpen" [fullName]="leaderApplicationFullName"
    [email]="leaderApplicationEmail" [phoneNumber]="leaderApplicationPhoneNumber"
    [availableOccupations]="communityPublicBadgeTags" [preferredOccupationId]="preferredApplicationOccupationId"
    (close)="closeLeaderApplicationModal()" (verified)="onVerified()">
  </app-community-leader-application-modal>
</section>
