<section class="news-department-hero" [style.--theme-color]="theme?.color || '#333333'">
  <div class="container text-center hero-inner">
    <p class="top-meta">Welcome at NYC360</p>
    <h1 class="main-title">{{ title }}</h1>
    <p class="sub-meta">{{ description }}</p>

    <form class="hero-search" (submit)="onSearch(searchInput.value); $event.preventDefault()">
      <i class="bi bi-search search-icon" aria-hidden="true"></i>
      <input #searchInput type="text" class="search-input" [placeholder]="searchPlaceholder" autocomplete="off">
      <button type="submit" class="search-btn">Search</button>
    </form>

    <div class="header-nav-buttons">
      <ng-container *ngFor="let btn of headerButtons">
        <div class="nav-dropdown-wrapper" *ngIf="btn.isDropdown; else standardButton">
          <button class="nav-btn dropdown-toggle-btn" type="button">
            <i class="bi" [ngClass]="btn.icon || 'bi-dot'"></i>
            <span class="ms-2">{{ btn.label }}</span>
            <i class="bi bi-chevron-down ms-2 small-arrow"></i>
          </button>

          <div class="dropdown-menu-custom">
            <ng-container *ngIf="!hasUnlockedContributorActions; else newsAccessActive">
              <button type="button" class="dropdown-item-custom" (click)="openNewsJourneyRequest()">
                <i class="bi bi-stars"></i>
                Start News Journey
              </button>
            </ng-container>
            <ng-template #newsAccessActive>
              <div class="dropdown-item-custom status-item">
                <i class="bi bi-patch-check-fill"></i>
                News Contributor Access Active
              </div>
            </ng-template>

            <button type="button" class="dropdown-item-custom" (click)="openNewsOrganizationEntry()">
              <i class="bi bi-geo-alt-fill"></i>
              Add a Location or Organization
            </button>

            <ng-container *ngIf="hasUnlockedContributorActions; else lockedWrite">
              <a [routerLink]="newsCreateRoute" [queryParams]="{ category: categoryId }" class="dropdown-item-custom">
                <i class="bi bi-pencil-square"></i>
                Write Post or Article
              </a>
            </ng-container>
            <ng-template #lockedWrite>
              <div class="dropdown-item-custom locked disabled-state">
                <i class="bi bi-lock-fill"></i>
                Write Post or Article
              </div>
            </ng-template>

            <ng-container *ngIf="hasUnlockedContributorActions; else lockedRss">
              <a [routerLink]="newsRssRoute" [queryParams]="{ category: categoryId }" class="dropdown-item-custom">
                <i class="bi bi-rss"></i>
                Import RSS Feed
              </a>
            </ng-container>
            <ng-template #lockedRss>
              <div class="dropdown-item-custom locked disabled-state">
                <i class="bi bi-lock-fill"></i>
                Import RSS Feed
              </div>
            </ng-template>

            <ng-container *ngIf="hasUnlockedContributorActions; else lockedPoll">
              <a [routerLink]="newsPollRoute" class="dropdown-item-custom">
                <i class="bi bi-lightning-charge-fill"></i>
                Create Poll
              </a>
            </ng-container>
            <ng-template #lockedPoll>
              <div class="dropdown-item-custom locked disabled-state">
                <i class="bi bi-lock-fill"></i>
                Create Poll
              </div>
            </ng-template>
          </div>
        </div>

        <ng-template #standardButton>
          <a [routerLink]="btn.link" [queryParams]="btn.queryParams" class="nav-btn">
            <i *ngIf="btn.icon" [class]="'bi ' + btn.icon + ' me-2'"></i>
            {{ btn.label }}
          </a>
        </ng-template>
      </ng-container>
    </div>
  </div>

  <app-verification-modal *ngIf="showVerificationModal" [categoryName]="theme?.label || 'News'"
    [categoryId]="categoryId" [extraOccupations]="modalOccupations.length ? modalOccupations : newsBadgeTags" (close)="closeModal()" (verified)="onVerified()">
  </app-verification-modal>
</section>
